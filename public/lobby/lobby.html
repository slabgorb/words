<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gamebox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/lobby/lobby.css">
</head>
<body>
  <header>
    <span class="header-screw header-screw-l" aria-hidden="true"></span>
    <span class="header-screw header-screw-r" aria-hidden="true"></span>
    <div id="brand-plate" aria-label="Gamebox">
      <svg class="brand-flourish" width="20" height="20" viewBox="0 0 20 20" aria-hidden="true">
        <rect x="2" y="2" width="16" height="16" rx="3" fill="#2a1808" opacity="0.85"/>
        <circle cx="6" cy="6" r="1.4" fill="#f3d97a"/>
        <circle cx="14" cy="14" r="1.4" fill="#f3d97a"/>
        <circle cx="10" cy="10" r="1.4" fill="#f3d97a"/>
      </svg>
      <span class="brand-text">GAMEBOX</span>
      <svg class="brand-flourish" width="18" height="20" viewBox="0 0 18 20" aria-hidden="true">
        <rect x="2" y="2" width="14" height="16" rx="2" fill="#2a1808" opacity="0.85"/>
        <text x="9" y="14" text-anchor="middle" font-family="Georgia, serif" font-weight="800" font-size="10" fill="#f3d97a">G</text>
      </svg>
      <span class="brand-rivet brand-rivet-tl"></span>
      <span class="brand-rivet brand-rivet-tr"></span>
      <span class="brand-rivet brand-rivet-bl"></span>
      <span class="brand-rivet brand-rivet-br"></span>
    </div>
    <button id="me-card" type="button" aria-haspopup="dialog" aria-label="Account">
      <span id="me-avatar" aria-hidden="true"></span>
      <span id="me-name"></span>
    </button>
  </header>

  <main id="lobby" hidden>
    <section id="sec-yours" class="bucket bucket-yours" hidden>
      <h2><span class="bucket-dot dot-filled" aria-hidden="true"></span>Your turn <span class="bucket-count" id="count-yours"></span></h2>
      <ul class="cards" id="list-yours"></ul>
    </section>

    <section id="sec-theirs" class="bucket bucket-theirs" hidden>
      <h2><span class="bucket-dot dot-hollow" aria-hidden="true"></span>Awaiting <span id="theirs-label">their reply</span> <span class="bucket-count" id="count-theirs"></span></h2>
      <ul class="cards" id="list-theirs"></ul>
    </section>

    <section id="sec-empty" hidden>
      <p class="empty">The cabinet is bare. Tap <span class="pill">+</span> below to challenge a friend.</p>
    </section>

    <section id="sec-caught-up" hidden>
      <p class="caught-up"><span class="check" aria-hidden="true">&check;</span> All caught up &mdash; <span id="caught-up-label"></span>.</p>
    </section>

    <section id="sec-ended" class="bucket bucket-ended" hidden>
      <button class="ended-toggle" id="ended-toggle" aria-expanded="true">
        <span class="chevron" aria-hidden="true">&#9662;</span>
        From the cabinet <span class="bucket-count" id="count-ended"></span>
      </button>
      <ul class="cards cards-ended" id="list-ended"></ul>
    </section>
  </main>

  <button id="fab" type="button" aria-label="Start a new game" hidden>+</button>

  <dialog id="newgame">
    <h3 id="ng-title">Start a new game</h3>
    <ol id="ng-steps"></ol>
    <button id="ng-cancel" type="button">Cancel</button>
  </dialog>

  <dialog id="logout-prompt" aria-labelledby="lo-title">
    <h3 id="lo-title">Sign out of Gamebox?</h3>
    <p id="lo-body">You can sign back in any time.</p>
    <div class="lo-actions">
      <button id="lo-cancel" type="button" class="lo-btn lo-btn-cancel">Stay signed in</button>
      <button id="lo-confirm" type="button" class="lo-btn lo-btn-confirm">Sign out</button>
    </div>
  </dialog>

  <script src="/lobby/lobby.js" type="module"></script>
</body>
</html>
