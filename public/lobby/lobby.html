<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gamebox</title>
  <link rel="stylesheet" href="/lobby/lobby.css">
</head>
<body>
  <header>
    <div id="me-card">
      <span id="me-avatar" aria-hidden="true"></span>
      <span id="me-name"></span>
    </div>
  </header>

  <main id="lobby" hidden>
    <section id="sec-yours" class="bucket bucket-yours" hidden>
      <h2><span class="bucket-dot dot-filled" aria-hidden="true"></span>Your move <span class="bucket-count" id="count-yours"></span></h2>
      <ul class="cards" id="list-yours"></ul>
    </section>

    <section id="sec-theirs" class="bucket bucket-theirs" hidden>
      <h2><span class="bucket-dot dot-hollow" aria-hidden="true"></span>Waiting on <span id="theirs-label">others</span> <span class="bucket-count" id="count-theirs"></span></h2>
      <ul class="cards" id="list-theirs"></ul>
    </section>

    <section id="sec-empty" hidden>
      <p class="empty">No active games. Tap <span class="pill">+</span> below to start one.</p>
    </section>

    <section id="sec-caught-up" hidden>
      <p class="caught-up"><span class="check" aria-hidden="true">✓</span> All caught up — <span id="caught-up-label"></span> to play.</p>
    </section>

    <section id="sec-ended" class="bucket bucket-ended" hidden>
      <button class="ended-toggle" id="ended-toggle" aria-expanded="true">
        <span class="chevron" aria-hidden="true">▾</span>
        Recently ended <span class="bucket-count" id="count-ended"></span>
      </button>
      <ul class="cards cards-ended" id="list-ended"></ul>
    </section>
  </main>

  <button id="fab" type="button" aria-label="Start a new game" hidden>+</button>

  <dialog id="newgame">
    <h3 id="ng-title">Start a new game</h3>
    <ol id="ng-steps"></ol>
    <button id="ng-cancel" type="button">Cancel</button>
  </dialog>

  <script src="/lobby/lobby.js" type="module"></script>
</body>
</html>
