<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Words</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main id="game" hidden>
    <header id="topbar">
      <div class="topbar-row">
        <a id="home-link" href="/" aria-label="Back to games" title="Back to games">←</a>
        <div id="score-a" class="score"></div>
        <div id="turn-pill" class="turn-pill"></div>
        <div id="score-b" class="score score-right"></div>
      </div>
      <div class="topbar-sub">
        <span id="bag-count"></span>
        <span id="rack-remaining"></span>
      </div>
    </header>
    <section id="board"></section>
    <section id="rack"></section>
    <div id="status" role="status" aria-live="polite"></div>
    <section id="controls">
      <button id="btn-submit" disabled>Submit move</button>
      <div class="controls-row">
        <button id="btn-recall">Recall tiles</button>
        <button id="btn-shuffle">Shuffle rack</button>
        <button id="btn-more" aria-label="More actions" aria-haspopup="dialog" aria-expanded="false">⋯</button>
      </div>
      <div class="controls-desk">
        <button id="btn-pass">Pass</button>
        <button id="btn-swap">Swap…</button>
        <button id="btn-resign">Resign</button>
      </div>
    </section>
  </main>

  <script type="module" src="/app.js"></script>
</body>
</html>
