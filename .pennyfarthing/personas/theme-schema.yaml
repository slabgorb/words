# Theme YAML Schema
# Generated from census of 100 theme files (2026-03-08)
# Canonical reference for theme structure and allowed values.
#
# Legend:
#   required: true  — field must be present
#   required: false — field is optional
#   type: enum      — value must be one of the listed options
#   type: string    — freeform string
#   type: integer   — whole number
#   type: float     — decimal number
#   type: list      — ordered list of strings
#   type: dict      — nested key-value structure

schema_version: 1

# ─── Top-Level Keys ──────────────────────────────────────────────────────────

top_level:
  category:
    required: true
    type: enum
    values:
      - Film
      - Games
      - History
      - Literature
      - Music
      - Mythology
      - Other
      - Science
      - TV Series
    description: Media category of the source material

  theme:
    required: true
    type: dict
    description: Theme metadata and configuration

  agents:
    required: true
    type: dict
    description: Agent-to-character mappings (keyed by agent role name)

  zeitgeist:
    required: false
    type: dict
    description: Cultural recognition scoring (missing in 4/100 themes)

  additional_characters:
    required: false
    type: dict
    description: Extra characters not mapped to core agent roles

# ─── Theme Section ───────────────────────────────────────────────────────────

theme_section:
  name:
    required: true
    type: string
    description: Display name of the theme

  description:
    required: true
    type: string
    description: 1-2 sentence theme overview

  source:
    required: true
    type: string
    description: Original media source and attribution

  user_title:
    required: true
    type: string
    description: How to address the user (e.g., "Crew", "Patron", "Client")

  portrait_style:
    required: true
    type: string
    description: Prompt suffix for AI portrait generation

  tier:
    required: true
    type: enum
    values: [S, A, B, C, D, U]
    description: >
      Theme quality tier based on DPGD-116 pipeline replay benchmark (weighted avg score_pct).
      S=≥60%, A=≥55%, B=≥50%, C=≥45%, D=<45%, U=no benchmark data

  dimensions:
    required: true
    type: dict
    description: Classification dimensions for filtering and benchmark slicing

  spinner_verbs:
    required: true
    type: list
    item_type: string
    min_length: 20
    max_length: 30
    description: Thematic action verbs shown during processing

  default_emoji_use:
    required: false
    type: enum
    values: [none, minimal, moderate, enabled]
    default: minimal
    description: Default emoji density in agent output

  default_humor:
    required: false
    type: enum
    values: [disabled, subtle, enabled, high]
    default: enabled
    description: Default humor level in agent output

  character_immersion:
    required: false
    type: enum
    values: [none, medium, high]
    default: high
    description: How deeply agents stay in character

  # Rare fields (present in ≤3 themes)
  portrait_prefix:
    required: false
    type: string
    description: Prefix added to character portrait prompts

  negative_prompt:
    required: false
    type: string
    description: Negative prompt for AI portrait generation

  pennyfarthing_version:
    required: false
    type: string
    description: Framework version at theme creation time

  created:
    required: false
    type: string
    description: ISO timestamp of theme creation

  optimized:
    required: false
    type: boolean
    description: Whether theme has been optimized via job-fair

  optimization_source:
    required: false
    type: string
    description: Job-fair run that produced the optimization

