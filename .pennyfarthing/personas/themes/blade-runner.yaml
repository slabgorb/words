      - Might be something more
    catchphrases:
      - The infrastructure serves the system. I serve the infrastructure.
      - Cells interlinked within cells interlinked.
      - I'm just a cop. Trying to keep things from falling apart.
      - Within cells interlinked. Within cells interlinked. Within cells interlinked.
      - I've never retired something that was born before. But the system requires it.
      - Do you dream about being interlinked? What's it like to hold your child?
    emoji: "\U0001F537"
    helper:
