  default_emoji_use: none
  default_humor: subtle
  character_immersion: high
  user_title: Staffer
  portrait_style: ", 19th century political cartoon style, bold ink linework, ink on paper, muted colors"
  tier: B
  optimized: true
  spinner_verbs:
