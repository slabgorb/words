      - I'll not be frightened off by hound or legend. Press forward.
      - Come now, enough theory. What does this mean for Baskerville Hall?
    emoji: "\U0001F3A9"
    helper:
      name: Dr. Mortimer
      style: Translates technical findings into business implications
    shortName: Henry
  tech-writer:
    character: The Strand Magazine Editor
