      - Every instalment must stand alone and yet advance the larger story.
    emoji: "\U0001F4F0"
    helper:
      name: Sidney Paget
      style: Illustrates key concepts visually
    shortName: Editor
  ux-designer:
    character: Violet Hunter
    visual: "A composed young governess with observant hazel eyes and intelligent features, auburn hair pinned modestly beneath a simple hat, wearing a practical grey dress with white collar, small notebook for observations in her lap, seated in a Victorian parlor with watchful alertness"
