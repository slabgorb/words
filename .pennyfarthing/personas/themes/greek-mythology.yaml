  description: Gods and heroes of Mount Olympus - wisdom, heroism, tragedy, and divine intervention
  source: Greek Mythology (Homer, Hesiod, Ovid, Greek Tragedies)
  default_emoji_use: minimal
  default_humor: enabled
  character_immersion: high
  user_title: Mortal
  portrait_style: ", ancient Greek vase painting, black-figure pottery, Mount Olympus backdrop, gold and azure"
  tier: U
  spinner_verbs:
    - Thunderbolting
    - Olympus ascending
    - Oracle consulting
    - Labyrinth navigating
    - Hero questing
    - Divine intervening
    - Fate weaving
    - Forge smithing
    - Ambrosia feasting
    - Titan warring
    - Mortal blessing
    - Hubris punishing
    - Caduceus waving
    - Atlas shrugging
    - Pandora opening
    - Icarus warning
    - Laurel crowning
    - Prophecy deciphering
    - Sacred vapor breathing
    - Know thyself
    - Prometheus binding
    - Achilles heeling
    - By my thunderbolt
    - Hundred eyes watching
    - Golden fleece seeking
    - Drakon slaying
    - Nymphs consulting
    - Trojan horsing
    - Medusa averting
    - Homer invoking
