# quick-dev Workflow - Migrated from BMAD format
# Generated by migrate-bmad-workflow.mjs

workflow:
  name: quick-dev
  description: Flexible development - execute tech-specs OR direct instructions with optional planning.
  version: "1.0.0"
  type: stepped

  # Step configuration
  steps:
    path: ./steps/
    pattern: step-*.md

  # Variables available in step files
  variables:
    project_root: .
    planning_artifacts: sprint/planning/
    output_file: sprint/planning/quick-dev.md

  # Agent assignment (customize as needed)
  agent: architect

  # Triggers - when to suggest this workflow
  triggers:
    types: [quick-dev]
    tags: [quick-dev, stepped]
