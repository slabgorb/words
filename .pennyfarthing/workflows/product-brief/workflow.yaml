# product-brief Workflow - Migrated from BMAD format
# Generated by migrate-bmad-workflow.mjs
# Story: PROJ-12134

workflow:
  name: product-brief
  description: Create comprehensive product briefs through collaborative step-by-step discovery as creative Business Analyst working with the user as peers.
  version: "1.0.0"
  type: stepped

  # Step configuration
  steps:
    path: ./steps/
    pattern: step-*.md

  # Variables available in step files
  variables:
    project_root: .
    planning_artifacts: sprint/planning/
    output_file: sprint/planning/product-brief.md

  # Template for product brief output
  template: ./templates/product-brief.template.md

  # Agent assignment - PM for product definition work
  agent: pm

  # Triggers - when to suggest this workflow
  triggers:
    types: [product-brief, brief]
    tags: [product-brief, stepped, analysis]
