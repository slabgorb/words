# TDD Workflow - Test-Driven Development
# Default workflow for feature development in Pennyfarthing
#
# Flow: SM → TEA → Dev → Architect (spec-check) → TEA (verify) → Reviewer → Architect (spec-reconcile) → SM
# Scale routing: 1-2 pts use 'trivial' workflow instead

workflow:
  name: tdd
  description: Test-driven development with code review
  version: "1.0.0"

  phases:
    - name: setup
      agent: sm
      output: [session_file, branches, story_context]
      gate:
        file: gates/sm-setup-exit
        type: sm_setup_exit
        condition: Session file created with workflow, phase, context, and branch
        recovery:
          epic-context-validated:
            action: create_context
            type: epic
            max_attempts: 1
          story-context-validated:
            action: create_context
            type: story
            max_attempts: 1

    - name: red
      agent: tea
      input: [session_file, story_context]
      output: [failing_tests]
      entry_gate:
        file: gates/tea-context
        type: tea_context
        condition: Story context validated before RED phase
      gate:
        file: gates/tests-fail
        type: tests_fail
        condition: All acceptance criteria have test coverage

    - name: green
      agent: dev
      input: [failing_tests, story_context]
      output: [implementation, passing_tests]
      gate:
        file: gates/dev-exit
        type: dev_exit
        condition: Tests green, tree clean, no debug code, correct branch

    - name: spec-check
      agent: architect
      input: [implementation, story_context]
      output: [spec_check_result]
      gate:
        file: gates/spec-check
        type: spec_check
        condition: All ACs addressed, no undocumented spec drift, deviations logged

    - name: verify
      agent: tea
      input: [implementation, passing_tests]
      output: [quality_verified]
      gate:
        file: gates/quality-pass
        type: quality_pass
        condition: Lint, typecheck, and all tests passing
      team:
        teammates:
          - agent: simplify-reuse
            task: "Review changed files for code duplication and extraction opportunities. Report findings only."
          - agent: simplify-quality
            task: "Review changed files for naming, readability, and structural quality. Report findings only."
          - agent: simplify-efficiency
            task: "Review changed files for unnecessary complexity and over-engineering. Report findings only."

    - name: review
      agent: reviewer
      input: [implementation, passing_tests, quality_verified]
      output: [approval]
      entry_gate:
        file: gates/status-sync
        type: status_sync
        condition: Story status is in_review in both YAML and Jira
      gate:
        file: gates/approval
        type: approval
        condition: Code review approved, no blocking issues
        recovery:
          reviewer-verdict:
            action: rework
            target_phase: green
            max_attempts: 3

    - name: spec-reconcile
      agent: architect
      input: [approval]
      output: [reconciliation_decisions]
      gate:
        file: gates/spec-reconcile-pass
        type: spec_reconcile
        condition: All spec-check failures reconciled, Architect reconcile section present

    - name: finish
      agent: sm
      input: [reconciliation_decisions]
      output: [archived_session, story_summary]
      entry_gate:
        file: gates/status-sync
        type: status_sync
        condition: Story status is in_review in both YAML and Jira

  triggers:
    types: [feature, enhancement]
    points:
      min: 3
    default: true
