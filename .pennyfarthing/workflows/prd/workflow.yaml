# prd Workflow - Migrated from BMAD format
# Generated by migrate-bmad-workflow.mjs
# Story: PROJ-12133

workflow:
  name: prd
  description: PRD tri-modal workflow - Create, Validate, or Edit comprehensive PRDs
  version: "1.0.0"
  type: stepped

  # Step configuration
  steps:
    path: ./steps-c/
    pattern: step-*.md

  # Tri-modal workflow paths
  modes:
    create: ./steps-c/
    validate: ./steps-v/
    edit: ./steps-e/

  # Variables available in step files
  variables:
    project_root: .
    planning_artifacts: sprint/planning/
    output_file: sprint/planning/prd.md

  # Gates - pause for user approval at key decision points
  gates:
    after_steps: [2, 8, 12]
    gate_marker: "<!-- GATE -->"

  # Template for PRD output
  template: ./templates/prd-template.md

  # Agent assignment
  agent: pm

  # Triggers - when to suggest this workflow
  triggers:
    types: [prd, requirements]
    tags: [prd, stepped]
