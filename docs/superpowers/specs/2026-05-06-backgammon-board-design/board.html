<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Backgammon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=JetBrains+Mono:wght@500;600;700&display=swap">
<link rel="stylesheet" href="board.css">
</head>
<body data-theme="walnut">
<div id="page">
  <header id="topbar">
    <a class="back" href="#">← Lobby</a>
    <div class="match-meta">
      <span class="match-target">Match to <strong>7</strong></span>
      <span class="dot"></span>
      <span class="game-no">Game 3</span>
    </div>
    <div class="float-actions">
      <button id="btn-tweaks-toggle" type="button" aria-label="Tweaks" title="Tweaks">⚙</button>
    </div>
  </header>

  <section id="scoreboard">
    <div class="score score-a">
      <span class="score-name">You</span>
      <span class="score-pts"><strong>4</strong> <span class="score-of">/ 7</span></span>
      <span class="score-pip">pip <em>121</em></span>
    </div>
    <div class="turn-pill" id="turn-pill">Your turn</div>
    <div class="score score-b">
      <span class="score-name">Sam</span>
      <span class="score-pts"><strong>3</strong> <span class="score-of">/ 7</span></span>
      <span class="score-pip">pip <em>134</em></span>
    </div>
  </section>

  <main id="stage">
    <div id="root"></div>
  </main>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="board.jsx"></script>
</body>
</html>
